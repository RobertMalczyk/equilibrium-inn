# Engine param_overrides stacked on the believable timescale for EVERY cast
# member. Enables the burst & saturation machinery (engine spec section 8
# burst): the loop-plateau latch + self-extinguishing episode and displaced
# discharge, plus the Loop-2 relief-seeking edge (stress raises urge_boredom,
# so a stressed persona seeks distraction THROUGH the world — the inn's
# activity economy is exactly that reactive world). Values are the engine
# eval's demo values (eval/burst_eval.py BURST_ON/LOOP2_ON), adopted as the
# inn's v1 enabling layer; calibration ownership stays with the engine.
engine_overrides:
  # Reactions are rate-limited: an outburst costs ~30 min of game time before
  # the next can fire (default cooldown 2 ticks let pairs ping-pong every
  # 4 minutes indefinitely - iteration C finding).
  action_params:
    # An outburst VENTS: it discharges the anger it expresses (default books
    # only resentment on the target, leaving anger pinned and re-firing -
    # iteration D finding). Cooldowns gate proactive starts only; reactive
    # rate-limiting comes from the discharge + the 1-tick reactive window.
    outburst:
      cooldown: 15
      post_effects:
        global: {anger: -0.50}
        source_relations: {resentment: 0.15}
  thresholds:
    # latch must catch real fights: anger 0.70 + stress 0.40 is the observed
    # mid-fight operating point; at 0.80/0.60 the latch never set and the
    # extinction circuit breaker stayed dormant.
    burst_enter.anger: 0.70
    burst_enter.stress: 0.40
    burst_exit: 0.30
    burst_confirm_ticks: 2
    # A reaction must answer a FRESH provocation (the engine burst eval's own
    # setting); the wide default window let stale provocations authorize
    # outbursts for 30+ minutes after the fight went one-sided.
    reactive_window_ticks: 1
    # 0.55 -> 0.75: displaced snaps only from a truly loaded state; at 0.55
    # displaced discharge + witness fan-out let a primed-but-unprovoked room
    # ignite itself (rain riot, register F-step).
    theta_displace: 0.75
  # 0.02 -> 0.10: a burst is a self-terminating EPISODE (~spike, a visible
  # act or two, forced cool-down), not a steady state. Engine's own
  # extinction arc demo uses 0.15.
  burst_extinction: {anger: 0.15, stress: 0.15}
  # Idle recovery OFF is part of the canonical G0 operating point: lingering
  # arousal carries the day-1 grudge into small, shallow (depth <= 3)
  # pre-lunch flares on days 2-3 - the corridor texture. AUDIT ITEM for G1:
  # this disables the engine's D10/D11 idle-recovery fix inn-wide; the
  # alternative is recovery on + corridor revised to ~2 incidents.
  idle_recovery: {stress: 0.0, anger: 0.0}
  derived_weights:
    urge_boredom:
      stress: 0.60

meals:
  # Meal events are food_given from marta, item by rotation per meal slot.
  source: marta
  menu_rotation: [cabbage_soup, bread, porridge, stew, smoked_fish, groats]
  intensity: 1.0

# The activity economy (section 5): supply as data. Work entries back the
# schedule blocks; leisure entries answer evening SEEKING. Depletion/replenish
# generalize mock_world's single novelty budget per source.
activities:
  - {id: chop_wood, room: yard, kind: work, window: ["06:00", "18:00"], capacity: 1,
     novelty_start: 1.0, deplete_per_offer: 0.10, replenish_per_tick: 0.004,
     min_novelty: 0.15, offer_latency: 2, outdoor: true}
  - {id: repair_fence, room: yard, kind: work, window: ["06:00", "18:00"], capacity: 2,
     novelty_start: 1.0, deplete_per_offer: 0.10, replenish_per_tick: 0.004,
     min_novelty: 0.15, offer_latency: 2, outdoor: true}
  - {id: muck_stalls, room: stable, kind: work, window: ["06:00", "18:00"], capacity: 1,
     novelty_start: 1.0, deplete_per_offer: 0.10, replenish_per_tick: 0.004,
     min_novelty: 0.15, offer_latency: 2, outdoor: false}
  - {id: tend_horses, room: stable, kind: work, window: ["06:00", "18:00"], capacity: 2,
     novelty_start: 1.0, deplete_per_offer: 0.10, replenish_per_tick: 0.004,
     min_novelty: 0.15, offer_latency: 2, outdoor: false}
  - {id: cook, room: kitchen, kind: work, window: ["06:00", "19:00"], capacity: 1,
