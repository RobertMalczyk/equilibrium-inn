# Engine param_overrides stacked on the believable timescale for EVERY cast
# member. Enables the burst & saturation machinery (engine spec section 8
# burst): the loop-plateau latch + self-extinguishing episode and displaced
# discharge, plus the Loop-2 relief-seeking edge (stress raises urge_boredom,
# so a stressed persona seeks distraction THROUGH the world — the inn's
# activity economy is exactly that reactive world). Values are the engine
# eval's demo values (eval/burst_eval.py BURST_ON/LOOP2_ON), adopted as the
# inn's v1 enabling layer; calibration ownership stays with the engine.
# Engine burst overlay toggle (engine 0176dbd M20.1). When true, the loader
# stacks the engine's CALIBRATED burst overlay (eval.burst_overrides: k_esc,
# extinction, latch band, theta_displace, displaced-relational discount, Loop-2
# seek cost — all anchored to the Layer-2 Jury bound + measured single-persona
# envelope). FINDING (coupled-stability, M-B): the burst overlay CANNOT be
# bounded in the coupled inn — it is calibrated for ONE persona's rare loaded
# episode, but a 7-way room re-provokes continuously and the latch escalation +
# slow extinction (0.0435) amplify it to runaway (1000+ incidents) at every
# tweak. The inn therefore runs with the overlay OFF and bounds reactions with
# its own proven dampers below. The displaced-discharge "vent only for unrelated
# triggers" model lives in the overlay, so it is DEFERRED to an engine
# coupled-stability fix (the cichy_multi_060 topology gap); until then the inn's
# vent is a blanket discharge. Flip true to consume the overlay once that lands.
burst_overlay: false

engine_overrides:
  # Reactions are rate-limited: an outburst costs ~30 min of game time before the
  # next can fire (engine default cooldown 2 let pairs ping-pong indefinitely).
  action_params:
    outburst:
      cooldown: 15
      # An outburst VENTS the anger it expresses (engine default -0.3 is too weak
      # for the coupled room -> runaway; -0.5 is the load-bearing damper, the G0
      # finding). Blanket discharge: with the overlay OFF there is no displacement
      # machinery, so every outburst is a direct-provoker reaction. The
      # "unrelated-only" vent is deferred with the overlay (see burst_overlay).
      post_effects:
        global: {anger: -0.50}
        source_relations: {resentment: 0.15}
  thresholds:
    # A reaction must answer a FRESH provocation (the engine burst-eval setting);
    # the wide default window let stale provocations authorize outbursts for 30+
    # min after a fight went one-sided.
    reactive_window_ticks: 1
  # Idle recovery OFF is the base; game_semantic_profile overlays a partial
  # frustration-only recovery (see `profiles`). g0_stability_profile keeps it off.
  idle_recovery: {stress: 0.0, anger: 0.0}

# Profiles (CLAUDE.md DEC-1): two instrument characters over ONE inn.yaml. Each
# overlays an engine_overrides delta (deep-merged onto the base above) plus a set
# of catalog entries to disable. The base config IS the hearth-stable profile, so
# `g0_stability_profile` is an empty overlay (byte-identical to the frozen G0
# operating point and its golden). `game_semantic_profile` is Option B: it adds a
# partial, frustration-ONLY idle recovery (DEC-2 — stress/anger still linger, so
# the day-1 grudge carries as corridor texture; only the frustration ratchet is
# relieved) and disables the hearth fallback, which RESTORES scarcity (a thin
# evening catalog again starves some seekers -> a thin<normal<rich gradient that
# the hearth otherwise neutralizes). frustration recovery rate is PROVISIONAL,
# to be tuned by the semantic G0 sweep. default names the shipped profile, but
# selection is still explicit at call sites until the M-B audit ratifies a flip.
profiles:
  default: game_semantic_profile
  g0_stability_profile:
    engine_overrides: {}
    disable_activities: []
  game_semantic_profile:
    engine_overrides:
      idle_recovery: {frustration: -0.010}
    disable_activities: [hearth_idle]

meals:
  # Meal events are food_given from marta, item by rotation per meal slot.
  source: marta
  menu_rotation: [cabbage_soup, bread, porridge, stew, smoked_fish, groats]
  intensity: 1.0

# The activity economy (section 5): supply as data. Work entries back the
# schedule blocks; leisure entries answer evening SEEKING. Depletion/replenish
# generalize mock_world's single novelty budget per source.
activities:
