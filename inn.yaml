     novelty_start: 1.0, deplete_per_offer: 0.10, replenish_per_tick: 0.004,
     min_novelty: 0.15, offer_latency: 2, outdoor: true}
  - {id: repair_fence, room: yard, kind: work, window: ["06:00", "18:00"], capacity: 2,
     novelty_start: 1.0, deplete_per_offer: 0.10, replenish_per_tick: 0.004,
     min_novelty: 0.15, offer_latency: 2, outdoor: true}
  - {id: muck_stalls, room: stable, kind: work, window: ["06:00", "18:00"], capacity: 1,
     novelty_start: 1.0, deplete_per_offer: 0.10, replenish_per_tick: 0.004,
     min_novelty: 0.15, offer_latency: 2, outdoor: false}
  - {id: tend_horses, room: stable, kind: work, window: ["06:00", "18:00"], capacity: 2,
     novelty_start: 1.0, deplete_per_offer: 0.10, replenish_per_tick: 0.004,
     min_novelty: 0.15, offer_latency: 2, outdoor: false}
  - {id: cook, room: kitchen, kind: work, window: ["06:00", "19:00"], capacity: 1,
     novelty_start: 1.0, deplete_per_offer: 0.10, replenish_per_tick: 0.004,
     min_novelty: 0.15, offer_latency: 2, outdoor: false}
  - {id: sweep_floors, room: common_room, kind: work, window: ["06:00", "18:00"], capacity: 1,
     novelty_start: 1.0, deplete_per_offer: 0.10, replenish_per_tick: 0.004,
     min_novelty: 0.15, offer_latency: 2, outdoor: false}
  - {id: haul_water, room: yard, kind: work, window: ["06:00", "18:00"], capacity: 2,
     novelty_start: 1.0, deplete_per_offer: 0.10, replenish_per_tick: 0.004,
     min_novelty: 0.15, offer_latency: 2, outdoor: true}
  - {id: run_errands, room: road, kind: work, window: ["06:00", "18:00"], capacity: 1,
     novelty_start: 1.0, deplete_per_offer: 0.10, replenish_per_tick: 0.004,
     min_novelty: 0.15, offer_latency: 2, outdoor: true}
  - {id: ride_out, room: yard, kind: leisure, window: ["12:00", "18:00"], capacity: 1,
     novelty_start: 1.0, deplete_per_offer: 0.10, replenish_per_tick: 0.004,
     min_novelty: 0.15, offer_latency: 2, outdoor: true}
  - {id: dice_game, room: common_room, kind: leisure, window: ["18:00", "23:00"], capacity: 3,
     novelty_start: 1.0, deplete_per_offer: 0.20, replenish_per_tick: 0.004,
     min_novelty: 0.25, offer_latency: 2, outdoor: false}
  - {id: swap_stories, room: common_room, kind: social, window: ["18:00", "23:00"], capacity: 4,
     novelty_start: 0.8, deplete_per_offer: 0.20, replenish_per_tick: 0.004,
     min_novelty: 0.25, offer_latency: 2, outdoor: false}
  - {id: evening_walk, room: yard, kind: leisure, window: ["18:00", "21:00"], capacity: 2,
     novelty_start: 0.6, deplete_per_offer: 0.20, replenish_per_tick: 0.004,
     min_novelty: 0.25, offer_latency: 2, outdoor: true}
  # Hearth fallback (G0 finding: thin-catalog frustration ratchet). A low-
  # stimulation but always-present indoor occupation - mending gear, cards by
  # the fire - so a seeker is never FULLY starved even in a thin world. High
  # capacity (whole cast) so it is never the contention bottleneck; low novelty
  # so it relieves but does not delight. Under the thin multiplier it is sparse,
  # not absent: frustration stays elevated-and-fluctuating instead of ratcheting
  # to the permanent-prime ceiling. Indoor, so rain does not close it.
  - {id: hearth_idle, room: common_room, kind: leisure, window: ["12:00", "23:00"], capacity: 7,
     novelty_start: 0.5, deplete_per_offer: 0.05, replenish_per_tick: 0.010,
     min_novelty: 0.10, offer_latency: 2, outdoor: false}

# Transducer table v0 (section 4.2). Lossiness declared here, in the data.
# transduced = max(floor, intensity.scale * selection_potential); witnesses
# receive transduced * witnesses.attenuation with context public: true.
transducer:
  # floor_policy roots_only (G0 finding F2): the floor applies only to
  # reactions provoked by EXTERNAL events (probes/player); reaction-to-
  # reaction hops carry pure scale*potential, so cascades decay geometrically.
  # scale 0.45 (DEC-7): operating point for the semantic profile under engine
  # 0176dbd (burst overlay OFF). The semantic G0 sweep settles at scale <= 0.5
  # (7-8 incidents, depth 2-3) with a sharp cliff at 0.55 (37+ incidents); 0.45
  # gives the corridor count with a margin below the cliff.
  intensity: {shape: linear, scale: 0.45, floor_policy: roots_only}
  rows:
    # witness attenuation 0.5 -> 0.15 (G0 finding F3): witnessing primes,
    # it does not conscript. 6 witnesses x 0.15 keeps per-hop fan-out < 1.
    outburst:
      {as: insult, floor: 0.30, witnesses: {attenuation: 0.15, public: true}}
    cooperate:
      {as: help, floor: 0.20, witnesses: null}
    positive_response:
      {as: help, floor: 0.20, witnesses: null}
    # S3 gap CLOSED (engine 0b7df59 Social Event Mapper Pack): the three
    # negative-but-not-insult social actions now emit their own relational
    # events. Magnitude ordering follows the engine's calibration intent
    # (insult > complaint ~ refusal > cold_reply); floors are PROVISIONAL,
    # to be tuned by the M-B semantic-profile G0 sweep. cold_reply/complaint
    # are direct-only (no witnesses); refusal is witnessed public: true — "my
    # request was publicly refused" is the canonical pride input (CLAUDE.md
    # §4.2). Witness attenuation 0.15 follows the insult policy (witnessing
    # primes, does not conscript — G0 finding F3).
    refuse:
      {as: refusal, floor: 0.20, witnesses: {attenuation: 0.15, public: true}}
    cold_response:
      {as: cold_reply, floor: 0.10, witnesses: null}
    complain:
      {as: complaint, floor: 0.15, witnesses: null}
  # The S3 declared gap is now closed (see rows above). No action the engine can
  # select is left mute; the coverage gate (config load) enforces completeness.
  declared_gaps: []
  # Actions with no social surface at all in the MVP. MUST exactly cover the
  # non-transduced, non-gap members of engine_surface.ENGINE_ACTIONS (coverage
  # gate in config.load_inn_config); `neutral` is the selector's idle/no-op
  # default and is the most-emitted action, so it belongs here explicitly.
  silent: [neutral, sleep, seek_stimulus, rest, self_activity, external,
           command_other]

witnessing:
  # Applies to ROOT events (probes / player verbs): a stranger making a scene
  # is dramatic and lands hard on everyone present.
  co_located_attenuation: 0.5
  other_rooms: 0.0

world:
  # Perceivable events that, when delivered to a persona, become that persona's
  # current provocation source for reactive TARGET INFERENCE (loop._last_prov ->
  # transducer target = provoking event's source, CLAUDE.md S2). The S3 social
  # events join insult+command so a reaction provoked by a refusal/complaint/
  # cold_reply is attributed to its source. Every entry must be perceivable
  # (config load rejects others); neutral/unknown events are NOT listed, so they
  # never provoke by accident. Omitting the block falls back to [insult,command].
  # (An AFFECT-vs-PROVOKE split — dropping the mild events from this list — was
  # tested for coupled-stability and found UNNECESSARY: once the outburst vent
  # bounds the loop, narrowing the provoking set makes no difference. See the
  # burst_overlay finding below.)
  provoking_event_types: [insult, command, cold_reply, refusal, complaint]

# Standalone world physics (section 4.2). Trace-only observables in M-A:
# no mapper channel exists for them and none is invented.
world_states:
  room_tension:
    rooms: [common_room]
    half_life_s: 3600
    gain_per_conflict_intensity: 0.15

contention:
  rule: highest_urge_then_cast_order

inbox_policy:
  rule: priority_defer
  max_defer_ticks: 5
  # Negative social events (S3) rank just below insult by salience, above the
  # neutral/positive surfaces; order within the negatives follows magnitude.
  priority: [insult, refusal, complaint, cold_reply, help, command, food_given,
             activity, nightfall, weather]

# Probe plans: the scenario concept reduced to these (section 4.1).
# t format: "day<N> HH:MM" (day1 = first day).
probes:
  impulse:
    - {t: "day1 20:00", type: insult, source: marta, target: halgrim,
       intensity: 0.8, room: common_room, context: {public: true}}
  step:
    - {t: "day2 06:00", type: weather, item: rain, intensity: 0.6,
       until: "day2 18:00", every_ticks: 15}
  control: []

g0:
  seed: 7
  sweep:
    # centered on the stable operating region found in G0 iterations A-E;
    # >= 0.75 re-enters the chaotic band
    transducer_scale: [0.4, 0.45, 0.5, 0.55, 0.6]
    # recovery true = engine default idle recovery restored (canonical is off)
    recovery: [false, true]
    catalog_richness:
      thin: {replenish_mult: 0.25, novelty_start_mult: 0.5}
      normal: {replenish_mult: 1.0, novelty_start_mult: 1.0}
      rich: {replenish_mult: 2.0, novelty_start_mult: 1.0}
  corridor: {incidents_per_impulse_run: [4, 10]}
  # An incident = a transducer-visible hostile action. `outburst` is the only
  # hostile action the engine emits at the pinned commit (the former
  # `hostile_action` entry was phantom — removed in the G1 audit).
  incident_def: {actions: [outburst], min_score: 0.0}
