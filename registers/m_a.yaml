findings:
  - id: F1-saturation
    text: Impulse protocol saturates at every swept cell so far (~2000+
      incidents, one cascade, depth ~400, anger pinned at clamp). Control is
      perfectly silent (0 incidents) — the explosion is coupled-loop gain,
      not probe machinery.
    next_step_type: calibration/damping (world-side), per section 7 taxonomy
  - id: F2-floors
    text: Per-row intensity floors (D3) remove the transducer-scale lever once
      a cascade runs — each hop re-injects >= floor energy. Scale 0.5 and 1.0
      produce nearly identical incident counts. Revisit floors at G1, or pair
      with world-side damping.
  - id: F3-witness-fanout
    text: 7 co-located personas in the evening common room x witness
      attenuation 0.5 gives effective loop gain > 1. Candidate dampers:
      lower attenuation, cohort choreography (deferred), witness-only scale.
  - id: F4-recovery-off-expression
    text: "Recovery off" sweep axis expressed cleanly through public surface as
      param_overrides idle_recovery {stress: 0, anger: 0} stacked on
      timescale_overrides(); no engine internals touched. Note
      timescale_overrides is re-exported via the seam — it is in
      eval.calibrated next to the sanctioned loaders but not named in
      CLAUDE.md section 3; flagged for the G1 audit.
  - id: F5-step-quiet
    text: Step protocol (rainy day) produces 0 incidents in early cells - rain
      primes (stress) and closes outdoor catalog but no provocation seeds a
      cascade. Plausible per design (priming changes incident probability
      only when provocations occur); worth a probe-plan variant at G1
      (rain + mild provocation).

