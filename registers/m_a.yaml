thin_catalog_hardening_2026_06_13:
  problem: at scale >= 0.55 with a THIN catalog, 2 cells limit-cycled
    (225, 472 incidents). Mechanism (NOT co-location): with idle recovery off,
    a thin evening catalog starves seekers night after night; frustration
    RATCHETS to 1.0 in the susceptible personas (wojslaw/welf/branic) and,
    having no relief valve, stays pinned -> the room is PERMANENTLY primed by
    day 3 -> any shared-room moment ignites.
  fix_committed: hearth_idle activity - high-capacity (7) always-present indoor
    occupation (cards/mending by the fire), common_room, 12:00-23:00. A seeker
    is never fully starved even under thin; frustration stays bounded instead of
    ratcheting. Result: ALL 30 cells now settle (0 limit-cycle, 0 saturate);
    worst upper-clamp dwell 0.00; 11 cells in corridor. Golden re-baselined.
  side_effect_FINDING: the hearth as tuned NEUTRALIZES scarcity. thin/normal/
    rich now ~identical (10.6 incidents; mean frustration 0.079 vs 0.076; mean
    boredom 0.153 vs 0.151). CLAUDE.md section 5 wants scarcity to be a live
    texture knob (work->tire->bore->fray); the hearth absorbs it. This is a
    trade-off, not a free win.
  option_B_alternative (NOT committed - a G1 decision):
    Drop the hearth; instead cap the ratchet with FRUSTRATION-ONLY idle
    recovery (idle_recovery.frustration). Scan results (scales 0.5/0.55/0.6):
      frus -0.004: rich/normal s0.5=6, thin s0.5=10, thin WORST=577 (runaway)
      frus -0.008: rich/normal=6,   thin=9,          thin WORST=260 (runaway)
      frus -0.015: rich/normal=3,   thin=6,          thin WORST=8   (stable)
    frus -0.015 is fully stable AND preserves a real scarcity gradient
    (rich 3 -> thin 6). KEY INSIGHT it exposes: the day-2/3 noon flares were
    substantially FRUSTRATION-primed, not pure resentment carryover - frus
    recovery removes ~7 of normal's 10 incidents. Cost: normal/rich fall below
    corridor (3); the corridor would be reached only in the SCARCE regime
    ("a well-stocked inn is calm; a thin one grumbles") - arguably more
    believable, but recenters the corridor and the headline result.
  recommendation_for_G1: choose the instrument's character -
    (1) hearth = scarcity-immune, corridor on normal catalog (committed); or
    (2) frustration-recovery = scarcity-driven, corridor in the thin regime.
    Both are stable. (2) is simpler (no fabricated activity) and faithful to
    section 5; (1) keeps the corridor where it was defined.

damping_iterations_2026_06_13:
  goal: corridor 4-10 incidents per 3-day impulse (user authorized iterating)
  A: witness attenuation 0.5->0.15 + floors roots_only + burst tuning
     (extinction 0.10, theta_displace 0.75) -> DEAD (0 incidents; probe's
     direct target Halgrim answers cold_response = declared gap; witnesses
     at 0.12 never ignite). Finding: ignition was always witness-borne.
  B: split attenuations - ROOT events (probes/player) witness at 0.5, hop
     reactions at 0.15 -> step/control clean, impulse still 1780 (pair
     ping-pong at full target intensity; anger never discharged).
  C: outburst/hostile cooldown 15 -> NO EFFECT (engine: reactive actions
     bypass cooldowns by design). Latch thresholds lowered to anger 0.70 /
     stress 0.40 so the latch catches real fights; extinction 0.15.
  D: reactive_window_ticks 1 (engine burst eval's own value) + outburst
     VENTS (post_effects anger -0.50; default discharges nothing, leaving
     anger pinned and re-firing) -> bounded episodes; scale gains authority
     because deposit now scales with hop intensity while vent is fixed.
  E: scale landscape mapped - <=0.70 stable (2 incidents), >=0.75 chaotic
     band (100-2000, non-monotonic). No corridor via scale alone with idle
     recovery on.
  final: canonical = scale 0.5 + idle_recovery OFF (engine_overrides).
     Lingering arousal carries the day-1 grudge into shallow pre-lunch
     flares on days 2-3: 10 incidents, 6 cascades, depth <= 3, all settle.
     Robust across scale 0.4-0.6 x normal/rich catalog (9-14 incidents).
     thin catalog destabilizes at scale >= 0.55 (472/225 incidents) -
     scarcity-driven instability, BY DESIGN visible on the catalog axis.
     recovery-on cells: always 2 incidents (sub-corridor alternative).
  formal: provoked rho(A) = 1.0063 - near-critical linear regime; episodes
     are bounded by the NONLINEAR machinery (vent discharge + burst latch +
     extinction), which a linearization cannot see. Consistent.
  audit_items_for_G1:
    - idle recovery disabled inn-wide (reverses engine D10/D11 fix in this
      context); alternative = recovery on with corridor revised to ~2.
    - outburst anger vent -0.50 is an inn-authored post_effect override;
      engine calibration does not own it yet - file as engine finding.
    - reactive_window_ticks 1 adopted from the engine burst eval, not from
      calibrated defaults.
    - root-vs-hop witnessing asymmetry (0.5 vs 0.15) is new world semantics;
      G1 should bless or revise the transducer table accordingly.

