  g0_rerun:
    impulse: still saturates in all 30 cells (1669-2357 incidents; max
      cascade depth GREW to ~836). Burst extinction (0.02/tick) cannot beat
      social re-injection - each new witness insult re-arms the loop before
      extinction matters.
    step: REGRESSION-SHAPED CHANGE - rain alone now ignites a full cascade
      (1351-1596 incidents vs 0 before). Mechanism: rain stress + Loop-2
      relief-seeking sends everyone seeking; rain closes the outdoor catalog;
      timeouts pile frustration; burst latch sets on (anger, stress) plateau;
      displaced discharge lets latched personas snap at non-provokers; the
      transducer makes that a witnessed insult -> the social loop seeds
      itself with no probe. Displaced discharge composed with the
      witness-fanout instability converts priming into ignition.
    control: still 0 incidents everywhere.
    formal: provoked-point rho(A) = 1.14 (cleaner than before, supercritical,
      direction agrees); quiescent 1.0000 marginal as before.
  conclusion: the burst machinery works as built (latch sets, extinction
    runs) but the inn's instability is in the WORLD loop (floors x witness
    fan-out), which burst cannot damp; and displaced discharge gives the
    primed-but-unprovoked inn a new ignition path. World-side damping
    remains the indicated fix before corridor tuning (G1 decision).

g0_result:
  verdict: ALL 30 impulse cells saturate (1466-2068 incidents vs corridor
    4-10); 0 cells in corridor. Control and step protocols are 0 incidents in
    every cell. Neither sweep axis (scale 0.5-2.0, recovery on/off, catalog
    richness) provides damping authority - see F2/F3.
  formal: quiescent rho(A) = 1.0000 (marginal, from pure integrators
    (sleep_pressure/duty drifts) and clamp-pinned states - intra-persona
    only, zero cross-persona gain). Provoked rho(A) ~ 1.1e4 - numerically
    inflated by threshold discontinuities (an eps=1e-4 perturbation flips a
    reaction on/off, a O(1) output change), so the provoked-point Jacobian
    measures switching, not smooth dynamics. Direction agrees with the
    empirical verdict (strong supercritical coupling); magnitude is not
    interpretable. Empirical result is authoritative per CLAUDE.md section 8.
  per_failure_taxonomy: too chaotic -> calibration/damping. G0's prescribed
    on-failure path applies - recovery layer alone is insufficient; a
    world-side damping factor (world config, not engine calibration) is the
    indicated next step before the corridor can be tuned.

