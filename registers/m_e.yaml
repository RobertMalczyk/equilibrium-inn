milestone: M-E (baseline cast + regression harness) + M-F (partial)
state: IMPLEMENTED (M-E). The deliberately-fair baseline cast runs side-by-side
  with the engine on the same schedule/world/probes; a regression harness freezes
  the canonical protocols' metric fingerprints. Observability/control only — ZERO
  engine-dynamics changes; golden + import contract intact. 106 tests green.
updated: 2026-06-15

done:
  - id: baseline-cast
    what: >
      inn/baseline.py — BaselineLoop: the industry-standard NPC as a fair control
      (CLAUDE.md §1/§7). Reuses the inn's world layer UNCHANGED (ScheduleStream,
      Presence, the transducer + witnessing, WorldStates, the society trace) and
      swaps the engine brain for a schedule automaton (work the block / eat /
      sleep) + a trigger->bark table (received insult -> outburst, gated by a fixed
      anger threshold + cooldown; no priming, no grudge integration, no variety).
      Emits the SAME trace schema, so inn.metrics / inn.observe / the Observatory
      read it identically. Deterministic (inn.yaml + probe plan). run_baseline()
      writes trace + session.json like inn.session.run_session.
  - id: baseline-config
    what: >
      inn.yaml `baseline` block — the automaton/bark tunables (anger_gain,
      bark_threshold, bark_score, cooldown_ticks, vent, boredom/fatigue rates,
      night_recover, …). Behaviour-shaping numbers as DATA (hard rule 0.3); read
      only by inn/baseline.py, never the engine path -> golden trace unaffected.
      Parsed in inn/config.py (InnConfig.baseline).
  - id: regression
    what: >
      experiments/regression.py — the canonical 3-day protocols (impulse/step/
      control) frozen like golden traces: compute_fingerprint() condenses the §7
      metric families (incidents, cascade depth/breadth, routine adherence, action
      entropy, offers, contention) into a deterministic dict per protocol, diffed
      against tests/golden/regression_metrics.json. `--freeze` re-baselines (the
      ritual on an engine pin bump). Asserted by tests/test_regression.py.
  - id: comparison
    what: >
      experiments/baseline_compare.py — engine vs baseline on every protocol,
      writing experiments/out/g0/baseline/comparison.md. Reads only traces.
  - id: mf-selfhost
    what: >
      observatory/build_bundle.py uses a LOCAL Pyodide runtime if
      observatory/pyodide/pyodide.js exists, else the CDN. observatory/
      fetch_pyodide.py downloads the v0.26.2 release tarball into
      observatory/pyodide/ (idempotent; --force/--check; not vendored; gitignored).
  - id: mf-parity-button
    what: >
      (M-F) One-click "Verify parity" in the cockpit: runs the fixed G2 session
      (control, seed 7, 1000 ticks, game_semantic_profile) in Pyodide and compares
      its trace SHA-256 to observatory/g2_reference.json, showing idle/running/
      passed/failed/error with both SHAs. Never blesses live mode unless the SHAs
      match; a failure leaves the Observatory working with the static export as the
      blessed fallback. experiments/g2_parity.py refactored to expose
      parity_status() (pure, tested) + build_reference()/ensure_reference().
      build_bundle ensures g2_reference.json exists for the button to fetch.
      Full G2 closure still needs a real in-browser run (documented).
  - id: mf-pages
    what: >
      (M-F) observatory/build_site.py — one DRY builder assembling observatory/
      _site/ (index.html=landing, observatory.html=static export, cockpit.html=
      Pyodide cockpit, inn_bundle.zip, g2_reference.json, assets/). observatory/
      landing.html — the public showcase page (not-a-game framing; links to the
      static Observatory, the live cockpit, and GitHub). .github/workflows/pages.yml
      clones the pinned engine, builds the site, and deploys to GitHub Pages (no
      secrets, no DNS). Optional custom domain via an observatory/CNAME file.
  - id: tests
    what: >
      tests/test_baseline.py (schema parity, metrics/observe read it, flat-control
      cascade depth<=1, determinism, sleeps+works) and tests/test_regression.py
      (fingerprints match golden). Full suite 106 green.

findings:
  - id: G2-verified
    what: >
      G2 PARITY VERIFIED 2026-06-15. The fixed session (control, seed 7, 1000
      ticks, game_semantic_profile) produces a byte-identical full-trace SHA-256
      under CPython and under Pyodide v0.26.2:
      6a7404b6c30c699e9498e04e9271d6f85823d97e1bc2de9c5fb9e84c1927573a. Verified by
      running the cockpit's run_parity in real Pyodide (CPython-in-WASM, same
      runtime the browser uses) via Node, loading inn_bundle.zip + numpy (Pyodide
      dist) + pyyaml (micropip). The in-cockpit "Verify parity" button performs the
      identical computation; this closes the G2 gate (interpreter parity). Pages is
      LIVE at https://robertmalczyk.github.io/equilibrium-inn/ (deploy succeeded).
  - id: F-me-1
    what: >
      Litmus result (impulse): engine = 8 incidents, cascade depth 3 / breadth 3
      (primed, propagating), action entropy ~1.69; baseline = 1 incident, depth 1
      / breadth 1 (a single triggered bark, no cascade), entropy ~1.54. Time
      budget: baseline rigidly busy ~42% during work blocks vs the engine's
      decided ~14% busy / ~55% idle / seeking+cooldown. The engine's living-world
      texture (cascades, priming, variety, an activity economy with contention)
      is exactly what the flat baseline lacks — the intended contrast, not a defect.

