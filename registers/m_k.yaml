bugfix-2026-06-17 (play regression): the M-K speed-aware play loop clamped at the last
  frame; since a finished run / live frontier parks the playhead at the END, pressing ▶
  play was a no-op (dead-on-arrival), and at the 120 s default even 20x advanced <1
  tick/2.5 s (real-time is ~120 s/tick there). Reproduced in-browser (frame 2150 ->
  2150). FIX (user decision: keep 1x=real-time, raise the cap):
  - inn/observatory.py: extracted pure DOM-free PLAYBACK_JS (playAdvance + playStartFrame);
    play now restarts from 0 when parked at the end (playStartFrame) and routes the speed
    loop through playAdvance (carries the fractional remainder, clamps + reports done).
  - observatory/build_bundle.py: speed options now 1/2/4/8/20/50/100/200x, DEFAULT 200x so
    play is watchable at the 120 s default (200x ~0.6 s/tick; finer dt needs less).
  - tests/test_playback_js.py (2): node-runs the pure helpers — restart-at-end, advances
    from start at 200x, clamps+done at end, 1x real-time cadence, fractional carry; plus a
    guard that SCRIPT calls playStartFrame/playAdvance. This is the test that WOULD have
    caught it (the prior tests only asserted code-presence). Re-verified in-browser:
    parked-at-end play restarts and advances (2150 -> 4 in 2.5 s), 0 console errors.

