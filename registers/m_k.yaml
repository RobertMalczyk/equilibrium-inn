resolution-of-the-block:
  - The engine added a `tick.resolution_factor` knob (engine 311be03, "S2-S4 dt resolution"):
    dt = min(half_life)*time_scale / (nyquist*R); the LOADER centrally converts every rate
    coeff (x1/R) and count/window (xR: *_ticks, cooldown, per_tick) so the real-time
    trajectory is preserved. R=1.0 is a guarded no-op -> byte-identical (golden proven).
    This is cleaner than parameterizing timescale_overrides — it composes ON TOP of the
    inn's believable-day timescale_overrides. KEY RULE: never hand-scale (loader is the
    single conversion point; hand-scaling would double-scale). My earlier plan item to
    scale inn-owned dampers is DROPPED — the loader scales them.
  - Also landed (off by default, bit-identical for the inn): a decoupled "spent-fury
    refractory" edge gated by thresholds.refractory_anger (unset in the inn -> no effect).

goal:
  Two linked features, accepted by the user:
  1. Finer game tick (dt) as an OPT-IN resolution so the time-plots curves are smoother
     and carry finer detail. Default stays dt=120 s (time_scale=40) -> golden/G2/G0 all
     untouched. Selectable finer dt (e.g. 30 s / 15 s) in the cockpit + scenario.
  2. Playback speed selector 1x/2x/4x/6x/8x/10x/20x. DECISION: 1x = REAL-TIME game tick
     (at dt=15 s, one tick per 15 real-seconds); multipliers compress. "Preserve total
     simulation time for three days" = the 3 game-days are the fixed unit being scaled.
     Pure cockpit playback — zero dynamics impact, works at any dt.

decisions-locked:
  - dt default: OPT-IN, keep 120 s default (golden/G2/G0 byte-identical; finer dt is a mode).
  - speed 1x: real-time game tick (game-time advances at real-time at 1x).

engine-verification (read-only, done 2026-06-17):
  - Engine integration is HYBRID. Core decay is dt-aware (decay = 2^(-dt/half_life)), so
    trajectory SHAPE is preserved under a clock reparametrization.
  - The inn's believable day = eval.calibrated.timescale_overrides() — HARDCODED time_scale=40
    (reads it from calibration/calibrated_timescale.yaml). It RE-DERIVES hunger/fatigue/boredom
    drifts + sleep discharge + seeking_timeout from real DURATIONS + dt (eval/calibrated.py
    ~L101-167). This duration re-derivation is what makes the day believable and is the
    operating point golden/G0/M-B sit on.
  - The maintainer's "easy knob" param_overrides tick.time_scale maps to eval.load_eval_persona
    (UNIFORM reparam, bit-identical per tick) — which does NOT include the duration-derived
    drifts. So it is NOT the same dynamics as the inn's believable day.
  - Secondary TICK-ANCHORED params are not re-derived by timescale_overrides and would shift
    in game-time at finer dt: engine-side action cooldown:2, idle_recovery, couplings, per_tick
    action effects, burst_confirm_ticks (burst off anyway); inn-side reactive_window_ticks:1 +
    cooldown:15 (these the inn CAN scale with dt since they live in inn.yaml).

blocking-dependency (the fork the user chose):
  - Chosen path: ENGINE FIRST. The user (engine owner) will parameterize the believable-day
    derivation — make eval.calibrated.timescale_overrides() / believable_day_layout() accept an
    optional time_scale (override the YAML k) — so a finer dt keeps the SAME believable-day
    re-derivation (drifts/sleep/seeking-timeout re-derived for the new dt). Then bump the inn
    pin (PINNED_COMMIT + inn.yaml meta.engine_commit) to consume it.
  - Rejected for now: (B) inn-side uniform tick.time_scale (changes the fine-mode dynamics);
    (C) inn re-implements the derivation (hard-rule-2 smell: duplicates engine logic).

implemented:
  - inn/loop.py: make_persona_loader(resolution_factor) injects tick.resolution_factor;
    _inn_day_layout() reads the refined dt from the SAME loader (clock dt == engine cfg.dt);
    InnLoop(resolution_factor=...) builds the loader before the clock. R=1 -> byte-identical.
    NO hand-scaling of dampers (loader converts centrally).
  - inn/session.py: run_session(resolution_factor); layout + n_ticks derive from loop.clock
    (so finer dt = more ticks for the same 3 days); header records resolution_factor; replay
    threads it. (Dropped the now-unused believable_day_layout import.)
  - inn/scenario.py: dump/replay carry resolution_factor (lossless reproduce at any R).
  - inn/live.py: LiveSession(resolution_factor=...); total = days * refined day_ticks when
    not given; dump_scenario carries it.
  - observatory/build_bundle.py: cockpit "resolution" (120/30/15 s = R 1/4/8) + "speed"
    (1x..20x) selectors; live_start(resolution); _emit sets window.PLAY_DT = clock dt.
  - inn/observatory.py (shared SCRIPT): speed-aware real-time playback loop (_playFrame):
    when window.PLAY_SPEED + PLAY_DT are set, advance PLAY_SPEED game-sec/real-sec
    (1x = real-time), else the default 90ms/frame step() (static export unchanged).
  - tests/test_resolution.py (6): R=1 byte-identical; finer-dt scales layout/n_ticks;
    trajectory preserved over game-time (convergent); scenario round-trip at R=8;
    LiveSession total scales; cockpit wires both selectors + the playback loop.

